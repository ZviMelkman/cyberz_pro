# CyberZ Jekyll Configuration
title: CyberZ | Industry-Specific Cybersecurity Resources
description: Practical cybersecurity education for healthcare, legal, accounting, real estate, and more.
url: "https://cyberz.pro"
baseurl: ""

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /blog/:year/:month/:day/:title/

defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: post

exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
