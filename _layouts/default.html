<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  <link rel="stylesheet" href="/assets/css/blog.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-logo">CYBERZ</div>
      <ul class="footer-links">
        <li><a href="#">Privacy Policy</a></li>
        <li><a href="#">Terms of Service</a></li>
        <li><a href="/#contact">Contact</a></li>
      </ul>
      <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }} CyberZ. All rights reserved. Protecting businesses, one bundle at a time.</p>
    </div>
  </footer>

  <script>
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('nav');
      nav.style.background = window.scrollY > 50 ? 'rgba(10, 10, 15, 0.95)' : 'rgba(10, 10, 15, 0.8)';
    });
  </script>
</body>
</html>
