<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  <link rel="stylesheet" href="/assets/css/blog.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  {% include nav.html %}

  <main>
    {{ content }}
  </main>

<footer style="padding:16px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;border:none;">
    <div style="font-family:'Orbitron',sans-serif;font-weight:700;font-size:16px;"><span style="color:#00f0ff;">CYBER</span><span style="color:#fff;">Z</span></div>
    <p style="font-family:'Space Mono',monospace;font-size:11px;color:#8a8a9a;margin:0;">&copy; {{ 'now' | date: "%Y" }} CyberZ. All rights reserved.</p>
    <div style="display:flex;gap:20px;">
      <a href="#" style="font-family:'Space Mono',monospace;font-size:11px;color:#8a8a9a;text-decoration:none;">Privacy</a>
      <a href="#" style="font-family:'Space Mono',monospace;font-size:11px;color:#8a8a9a;text-decoration:none;">Terms</a>
      <a href="/#contact" style="font-family:'Space Mono',monospace;font-size:11px;color:#8a8a9a;text-decoration:none;">Contact</a>
    </div>
  </footer>
  

  <script>
    window.addEventListener('scroll', () => {
      const nav = document.querySelector('nav');
      nav.style.background = window.scrollY > 50 ? 'rgba(10, 10, 15, 0.95)' : 'rgba(10, 10, 15, 0.8)';
    });
  </script>
</body>
</html>
